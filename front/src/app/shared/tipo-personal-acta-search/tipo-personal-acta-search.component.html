<nz-select
  [ngModel]="selected"
  (ngModelChange)="modelChange($event)"
  (blur)="onBlur()"
  [nzDisabled]="controlDisabled"
  nzAllowClear
  nzShowSearch
  nzPlaceHolder="Tipo Acta"
  [nzDropdownMatchSelectWidth]="false"
  style="width: 100%;">
  @for (tipo of tiposPersonalActa(); track tipo.value) {
    <nz-option [nzLabel]="tipo.label" [nzValue]="tipo.value"></nz-option>
  }
</nz-select>
