<nz-card class="small-margin">

  @if (columns().length) {
    <div nz-tab>
      <div nz-row style="align-items: center; display: flex; justify-content: space-between;">
        <div style="flex: 1;">
          <shared-filtro-builder [fieldsToSelect]="columns()" [startFilters]="startFilters()" [(options)]="listOptions"  />
        </div>
        <div style="flex-shrink: 0;">
          <nz-button-group nz-button nzButtonGroup>
            <!-- Agregar Descuento -->
            <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.icon.add' | i18n }}" (click)="openDrawerforAltaDescuentos()">
              <span nz-icon nzType="plus" nzTheme="outline"></span>
            </button>
            <!-- Editar Descuento -->
            <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.icon.edit' | i18n }}" (click)="openDrawerforEditDescuentos()"
              [disabled]="ObjetivoDescuentoId() == 0 && objetivoId() == 0">
              <span nz-icon nzType="edit" nzTheme="outline"></span>
            </button>
            <!-- Detalle Descuento -->
            <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.detail' | i18n }}" (click)="openDrawerforDetailDescuentos()"
              [disabled]="ObjetivoDescuentoId() == 0 && objetivoId() == 0">
              <span nz-icon nzType="info-circle" nzTheme="outline"></span>
            </button>
            <!-- Anular Descuento -->
            <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.anular' | i18n }}" (click)="openDrawerforCancelDescuentos()"
              [disabled]="ObjetivoDescuentoId() == 0 && objetivoId() == 0">
              <span nz-icon nzType="delete" nzTheme="outline"></span>
            </button>
            <button nz-button nzType="default" (click)="gridData.reload()" nz-tooltip nzTooltipTitle="{{ 'app.icon.reload' | i18n }}"
            [disabled]="gridData.isLoading()">
              <span nz-icon nzType="reload" nzTheme="outline"></span>
            </button>

          </nz-button-group>
        </div>
      </div>
      <div class="gridDescObjetivos container-fluid">
        <angular-slickgrid gridId="gridDescObjetivos" [columns]="columns()  | colsFilter" [options]="gridOptions"
          [dataset]="gridData.value()" (onAngularGridCreated)="angularGridReady($event)"
          (onSelectedRowsChanged)="handleSelectedRowsChanged($event)">
        </angular-slickgrid>
      </div>
    </div>
  }
</nz-card>

<app-descuentos-objetivos-alta-drawer [(visibleDesc)]="visibleAltaDesc" (onAddorUpdate)="onAddorUpdate($event)" [crudAccion]="crudAccion()"></app-descuentos-objetivos-alta-drawer>

<app-descuentos-objetivos-alta-drawer [(visibleDesc)]="visibleEditDesc" [objetivoId]="objetivoId()" [ObjetivoDescuentoId]="ObjetivoDescuentoId()" (onAddorUpdate)="onAddorUpdate($event)" [crudAccion]="crudAccion()"></app-descuentos-objetivos-alta-drawer>
