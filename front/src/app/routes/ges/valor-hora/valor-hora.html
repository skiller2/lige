


    
<nz-card class="small-margin">
<div class="izquierda">
      <nz-form-control>
        <nz-date-picker nzMode="month" [(ngModel)]="periodo" nzPlaceHolder="Periodo" (ngModelChange)="refreshList()"/>
      </nz-form-control>
    </div>
  @if ((columns$|async); as columnas) {
    <div nz-tab>
      <!-- <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">-->
      <div class="fila">
        <div class="izquierda">
          <shared-filtro-builder  [fieldsToSelect]="columnas" [startFilters]="startFilters()"
            (optionsChange)="listOptionsChange($event)" />
          </div>
          <nz-button-group nz-button nzButtonGroup class="derecha">
            <a nz-tooltip nzTooltipTitle="{{ 'app.icon.add' | i18n }}">
              <button nz-button nzType="default" (click)="addNewItem()"><span nz-icon nzType="plus" nzTheme="outline"></span></button>
            </a>
            <a nz-tooltip nzTooltipTitle="{{ 'app.icon.delete' | i18n }}">
              <button nz-button nzType="default" [disabled]=" editValorHora().length == 0" (click)="deleteItem()"><span nz-icon nzType="delete" nzTheme="outline"></span></button>
            </a>
          </nz-button-group>
        </div>
        <div class="gridContainer container-fluid">
          <angular-slickgrid gridId="gridEdit" [columns]="columnas  | colsFilter" [options]="gridOptionsEdit"
            [dataset]="(gridData$ | async) || []" (onAngularGridCreated)="angularGridReadyEdit($event)"
            (onSelectedRowsChanged)="handleSelectedRowsChanged($event)" (onCellChange)="onCellChanged($event)" (onBeforeEditCell)="handleOnBeforeEditCell($event)">
          </angular-slickgrid>
        </div>
      </div>
    }

  </nz-card>
