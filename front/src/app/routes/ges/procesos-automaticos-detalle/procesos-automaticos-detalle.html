
<br>
<form [formGroup]="formProcAuto">

  <nz-form-item class="marginElement">
    <nz-form-label [nzXs]="3">Código</nz-form-label>
    <nz-form-control [nzMd]="19">
      <input nz-input placeholder="" formControlName="EventoLogCodigo" type="number" [readonly]="true"/>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-label [nzXs]="3">Nombre</nz-form-label>
    <nz-form-control [nzMd]="19">
      <input nz-input placeholder="" formControlName="NombreProceso" type="text" [readonly]="true"/>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-label [nzXs]="3">Inicio</nz-form-label>
    <nz-form-control [nzMd]="19">
      <nz-date-picker formControlName="FechaInicio" [nzShowTime]="{ nzFormat: 'HH:mm' }" nzFormat="dd/MM/yyyy HH:mm" [nzDisabled]="true"></nz-date-picker>
      <!-- <input nz-input placeholder="" formControlName="FechaInicio" type="text" [readonly]="true"/> -->
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-label [nzXs]="3">Fin</nz-form-label>
    <nz-form-control [nzMd]="19">
      <nz-date-picker formControlName="FechaFin" [nzShowTime]="{ nzFormat: 'HH:mm' }" nzFormat="dd/MM/yyyy HH:mm" [nzDisabled]="true"></nz-date-picker>
      <!-- <input nz-input placeholder="" formControlName="FechaFin" type="text" [readonly]="true"/> -->
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-label [nzXs]="3">Descripcion</nz-form-label>
    <nz-form-control [nzMd]="19">
      <input nz-input placeholder="" formControlName="Descripcion" type="text" [readonly]="true"/>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-control [nzXs]="1"></nz-form-control>
    <nz-form-control [nzXs]="22">
      <h3>Parametro Entrada</h3>
      <app-object-viewer [data]="ParametroEntrada()"></app-object-viewer>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item class="marginElement">
    <nz-form-control [nzXs]="1"></nz-form-control>
    <nz-form-control [nzXs]="22">
      <h3>Resultado</h3>
      <app-object-viewer [data]="Resultado()"></app-object-viewer>
    </nz-form-control>
  </nz-form-item>

    
  @if (logCod()) {
    <nz-form-item class="marginElement">
      <nz-form-control [nzXs]="23" style="text-align: right;">
        <button nz-button nzType="default" nz-popover nzPopoverTitle="Historial de Auditoria" [nzPopoverContent]="contentTemplate" [nzPopoverPlacement]="['topRight', 'top', 'topLeft']">
          <span nz-icon nzType="menu-unfold" nzTheme="outline"></span>
        </button>
        <ng-template #contentTemplate>
          <nz-table #history [nzData]="auditHistory()" [nzShowPagination]="false">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Fecha</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody>
              @for (item of history.data; track item) {
                <tr>
                  <td>{{ item.usuario }}</td>
                  <td>{{ item.fecha }}</td>
                  <td>{{ item.accion }}</td>
                </tr>
              }
            </tbody>
          </nz-table>
        </ng-template>
      </nz-form-control>
    </nz-form-item>
  }


</form>
