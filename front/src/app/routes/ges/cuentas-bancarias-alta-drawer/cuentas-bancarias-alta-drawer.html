<nz-drawer [nzClosable]="false" [nzVisible]="visible()" [nzPlacement]="placement" [nzWidth]="700"
  [nzTitle]="'Alta Cuentas Bancarias'" (nzOnClose)="visible.set(false)">
  <ng-container *nzDrawerContent>
    <!-- <nz-card nzType="inner" nzTitle="Agregar Nuevos Datos Bancarios" > -->
    <form (ngSubmit)="save()">

      <nz-form-item class="marginElement">
        <nz-form-label [nzXs]="5">Banco</nz-form-label>
        <nz-form-control [nzMd]="16">
          <nz-select [formField]="formCuentasBancarias.BancoId" nzPlaceHolder="Banco" nzAllowClear
            [nzDropdownMatchSelectWidth]="false" nzShowSearch>
            @for (option of optionsBanco(); track option.value) {
              <nz-option [nzValue]="option.value" [nzLabel]="option.label"></nz-option>
            }
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="marginElement">
        <nz-form-label [nzXs]="5">Desde</nz-form-label>
        <nz-form-control [nzMd]="16">
          <nz-date-picker [formField]="formCuentasBancarias.Desde" nzFormat="dd/MM/yyyy"></nz-date-picker>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="marginElement">
        <nz-form-label [nzXs]="5">CUITs</nz-form-label>
        <nz-form-control [nzMd]="16">
          <textarea [formField]="formCuentasBancarias.CUITs" style="width: 100%; height: 300px;"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control style="display: flex; justify-content: center; align-items: center;">
          <button nzType="primary" nz-button [nzLoading]="formCuentasBancarias().submitting()" 
            [disabled]="formCuentasBancarias().submitting() || formCuentasBancarias().dirty()==false">
            {{ 'app.btn.save' | i18n }}
          </button>
        </nz-form-control>
      </nz-form-item>

    </form>
    <!-- </nz-card> -->

  </ng-container>
</nz-drawer>
