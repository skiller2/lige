<nz-card #tabpersonalefecto class="small-margin">
    <ng-container>
    @if(columns().length; as columnas) {
      @if(filtroVisible()) {
        <shared-filtro-builder [fieldsToSelect]="columns()" (optionsChange)="listOptionsChange($event)" [startFilters]="startFilters()" />
      }
      
      <div class="gridContainerObjetivosEfecto container-fluid">
        <angular-slickgrid 
          gridId="gridObjetivosEfecto" 
          [columns]="columns() | colsFilter"
          [options]="gridOptions" 
          [dataset]="gridData.value()"
          (onAngularGridCreated)="angularGridReady($event)">
        </angular-slickgrid>
      </div>
    }
    </ng-container>
  </nz-card>
