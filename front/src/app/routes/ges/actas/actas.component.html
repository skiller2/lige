<nz-card class="small-margin">
  <div style="align-items: end; display: flex; justify-content: space-between;">
    <ul nz-menu nzMode="horizontal">
      <li nz-menu-item nzMatchRouter>
        <span nz-icon nzType=""></span>
        <a [routerLink]="['/', 'ges', 'actas','listado']">Actas</a>
      </li>
      <li nz-menu-item nzMatchRouter>
        <span nz-icon nzType=""></span>
        <a [routerLink]="['/', 'ges', 'actas','listado-personal']">Personal</a>
      </li>
    </ul>
    <nz-button-group nz-button nzButtonGroup>
      <!-- btn  add -->
      <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.icon.add' | i18n }}"
        (click)="selectNewItemRow()">
        <span nz-icon nzType="plus" nzTheme="outline"></span></button>
      <!-- btn  delete -->
      <button nz-button nzType="default" [disabled]="selectedActaId() == 0" nz-tooltip
        nzTooltipTitle="{{ 'app.icon.delete' | i18n }}" nz-popconfirm
        nzPopconfirmTitle="¿Esta seguro que quiere eliminar el Nro.Acta {{selectedNroActa()}}?"
        (nzOnConfirm)="deleteItem()">
        <span nz-icon nzType="delete" nzTheme="outline"></span></button>
      <button nz-button nzType="default" (click)="refreshListActas('')"><span nz-icon nzType="reload" nzTheme="outline"
          nz-tooltip nzTooltipTitle="{{ 'app.icon.reload' | i18n }}"></span></button>
    </nz-button-group>

  </div>

  <nz-tabs nzCentered nzLinkRouter class="hide-ant-tabs-nav">
    <nz-tab>
      <a nz-tab-link routerLink="/ges/actas/listado">Actas</a>
      @if (columns().length) {
      <ng-template nz-tab>
        <shared-filtro-builder [fieldsToSelect]="columns()" [startFilters]="startFilters"
          (optionsChange)="listOptionsChange($event)" />
        <div class="gridContainer container-fluid">
          <angular-slickgrid gridId="grid" [columns]="columns() | colsFilter" [options]="gridOptions"
            [dataset]="gridData.value() || []" (onAngularGridCreated)="angularGridReady($event)"
            (onSelectedRowsChanged)="handleSelectedRowsChanged($event)">
          </angular-slickgrid>
        </div>
      </ng-template>
      }
    </nz-tab>
    <nz-tab>
      <a nz-tab-link routerLink="/ges/actas/listado-personal">Personal</a>
      <ng-template nz-tab>
        <app-actas-personal-listado></app-actas-personal-listado>
      </ng-template>

    </nz-tab>

  </nz-tabs>

</nz-card>
