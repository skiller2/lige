<nz-card class="small-margin">

  @if (columns().length) {
    <div nz-tab>
      <div nz-row style="align-items: center; display: flex; justify-content: space-between;">
        <div style="flex: 1;">
          <shared-filtro-builder [fieldsToSelect]="columns()" [startFilters]="startFilters()" [(options)]="listOptions"  />
        </div>
        <div style="flex-shrink: 0;">
          <nz-button-group nz-button nz-buttonGroup>
            <!--  -->
            <!-- <button nz-button nzType="default" nz-tooltip nzTooltipTitle="{{ 'app.icon.add' | i18n }}" (click)="openDrawerforAltaDescuentos()">
              <span nz-icon nzType="plus" nzTheme="outline"></span>
            </button> -->
          </nz-button-group>
        </div>
      </div>
      <div class="gridInconsistencias container-fluid">
        <angular-slickgrid gridId="gridInconsistencias" [columns]="columns()  | colsFilter" [options]="gridOptions"
          [dataset]="gridData.value()||[]" (onAngularGridCreated)="angularGridReady($event)"
          (onSelectedRowsChanged)="handleSelectedRowsChanged($event)">
        </angular-slickgrid>
      </div>
    </div>
  }

</nz-card>
