@if ((columns$ | async); as columnas) {
  <div class="fila">
    <div class="izquierda">
      <shared-filtro-builder [fieldsToSelect]="columnas" (optionsChange)="listOptionsChange($event)" />
    </div>
  </div>

  <div class="gridListadoContainer container-fluid">
    <angular-slickgrid gridId="gridListado" [columns]="columnas | colsFilter" [options]="gridOptions"
      [dataset]="(gridData$ | async) || []" (onAngularGridCreated)="angularGridReady($event)">
    </angular-slickgrid>
  </div>
}
